<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern HTML CSS</title>
  </head>
  <body>
    <!-- Relative Path -->
    <img
      src="varsityFriends.jpg"
      alt="varsity Friends"
      width="500"
      height="400"
      title="This is a memorable photo"
    />

    <!-- Absulate Path -->
    <img
      src="https://picsum.photos/300/300"
      alt="Random photos"
      title="Natural photos"
    />

    <!-- fig and fircaption for giving captin  -->

    <figure>
      <img
        src="https://picsum.photos/300/300"
        alt="Random photos"
        title="Natural photos"
      />
      <figcaption>
        FIg: 1 This all photos are collected from random website
      </figcaption>
    </figure>
  </body>
</html>
